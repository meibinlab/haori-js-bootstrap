<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haori.js Bootstrap Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3">Haori.js Bootstrap</h1>
        <p class="text-body-secondary mb-0">読み込み時自動有効化と UI API の最小デモです。</p>
      </header>

      <section aria-labelledby="status-heading" class="card mb-4">
        <div class="card-body">
          <h2 class="h5" id="status-heading">現在の状態</h2>
          <p class="mb-0" id="status">初期化中...</p>
        </div>
      </section>

      <section aria-labelledby="actions-heading" class="card mb-4">
        <div class="card-body">
          <h2 class="h5" id="actions-heading">アクション</h2>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-primary" id="show-dialog" type="button">dialog</button>
            <button class="btn btn-outline-primary" id="show-confirm" type="button">confirm</button>
            <button class="btn btn-success" id="show-toast" type="button">toast</button>
          </div>
        </div>
      </section>

      <section aria-labelledby="message-heading" class="card">
        <div class="card-body">
          <h2 class="h5" id="message-heading">メッセージ管理</h2>
          <div class="mb-3">
            <label class="form-label" for="sample-input">サンプル入力</label>
            <input class="form-control" id="sample-input" type="text" />
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-danger" id="add-message" type="button">addErrorMessage</button>
            <button class="btn btn-outline-secondary" id="clear-message" type="button">clearMessages</button>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
